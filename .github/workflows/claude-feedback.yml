name: Claude Feedback to CLAUDE.md

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]

jobs:
  update-claude-md:
    runs-on: ubuntu-latest
    if: contains(github.event.comment.body, '@claude') || contains(github.event.comment.body, '@.claude')
    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract instruction and update CLAUDE.md
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const comment = context.payload.comment.body;
            const marker = comment.includes('@.claude') ? '@.claude' : '@claude';
            const instruction = comment.substring(comment.indexOf(marker) + marker.length).trim();

            if (!instruction) {
              console.log('No instruction found after @claude');
              return;
            }

            const ruleLine = `- ${instruction}`;
            let content = fs.readFileSync('CLAUDE.md', 'utf8');

            // Find the auto-generated section or append to Rules
            const autoSection = '## Auto-generated Rules from PR Feedback';
            if (content.includes(autoSection)) {
              const idx = content.indexOf(autoSection) + autoSection.length;
              content = content.slice(0, idx) + '\n' + ruleLine + content.slice(idx);
            } else {
              const rulesSection = '## Rules';
              const idx = content.indexOf(rulesSection) + rulesSection.length;
              content = content.slice(0, idx) + '\n' + ruleLine + content.slice(idx);
            }

            fs.writeFileSync('CLAUDE.md', content);
            console.log('Appended rule:', ruleLine);

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add CLAUDE.md
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "docs(claude): add rule from PR feedback"
            git push
          fi
